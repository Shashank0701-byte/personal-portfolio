services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    image: shashank-portfolio:latest
    container_name: portfolio
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    # Read-only root filesystem — nothing should write at runtime
    read_only: true
    tmpfs:
      - /tmp
